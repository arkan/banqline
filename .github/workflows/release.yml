---
name: Release

"on":
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-26-intel
            target: x86_64-apple-darwin
          - os: macos-26
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: >-
          cargo build --locked --release --bin banqline
          --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          binary="banqline"
          version="${GITHUB_REF_NAME#v}"
          target="${{ matrix.target }}"
          package_dir="${binary}-${version}-${target}"
          archive="${package_dir}.tar.gz"

          mkdir -p "dist/${package_dir}"
          cp "target/${target}/release/${binary}" \
            "dist/${package_dir}/${binary}"
          cp README.md LICENSE "dist/${package_dir}/"

          tar -czf "dist/${archive}" -C dist "${package_dir}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: banqline-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" \
            --verify-tag \
            --generate-notes \
            dist/*.tar.gz \
            dist/checksums-sha256.txt
